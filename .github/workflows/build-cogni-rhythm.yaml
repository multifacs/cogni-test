name: Build and Push Cogni-Rhythm

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set environment
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "MODE=PROD" >> $GITHUB_ENV
            echo "TAG=latest" >> $GITHUB_ENV
          else
            echo "MODE=DEV" >> $GITHUB_ENV
            echo "TAG=dev" >> $GITHUB_ENV
          fi
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/cogni-rhythm
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/cogni-rhythm:${{ env.TAG }}
          build-args: |
            PUBLIC_VAPID_SUBJECT=${{ secrets.PUBLIC_VAPID_SUBJECT }}
            PUBLIC_VAPID_KEY=${{ secrets.PUBLIC_VAPID_KEY }}
            PRIVATE_VAPID_KEY=${{ secrets.PRIVATE_VAPID_KEY }}
            MODE=${{ env.MODE }}
            BUILD=node