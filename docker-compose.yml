services:
  nginx:
    image: ghcr.io/multifacs/cogni-test/nginx:latest
    profiles:
      - "nginx"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /root/cogni-test/certs:/etc/ssl/new-certs:ro
    networks:
      - cogni-network

  cogni-test-dev:
    build:
      context: ./apps/cogni-test
    image: ghcr.io/multifacs/cogni-test/cogni-test:dev
    profiles:
      - "dev"
    container_name: cogni-test-dev
    restart: always
    networks:
      - cogni-network  # ← All containers on same network
    volumes:
      - /root/cogni-test/data/:/app/data
    environment:
      - MODE=DEV
      - DATABASE_URL=file:./data/dev.db
      - PUBLIC_VAPID_SUBJECT=${PUBLIC_VAPID_SUBJECT}
      - PUBLIC_VAPID_KEY=${PUBLIC_VAPID_KEY}
      - PRIVATE_VAPID_KEY=${PRIVATE_VAPID_KEY}
      - ORIGIN=https://dev2.cogni-test.ru
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    stdin_open: true  # -i
    tty: true         # -t

  cogni-test:
    build:
      context: ./apps/cogni-test
    image: ghcr.io/multifacs/cogni-test/cogni-test:latest
    profiles:
      - "prod"
    container_name: cogni-test
    restart: always
    networks:
      - cogni-network  # ← All containers on same network
    volumes:
      - /root/cogni-test/data/:/app/data
    environment:
      - MODE=PROD
      - DATABASE_URL=file:./data/cogni.db
      - PUBLIC_VAPID_SUBJECT=${PUBLIC_VAPID_SUBJECT}
      - PUBLIC_VAPID_KEY=${PUBLIC_VAPID_KEY}
      - PRIVATE_VAPID_KEY=${PRIVATE_VAPID_KEY}
      - ORIGIN=https://cogni-test.ru
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    stdin_open: true  # -i
    tty: true         # -t

  cogni-rhythm-dev:
    build:
      context: ./apps/cogni-rhythm
    image: ghcr.io/multifacs/cogni-test/cogni-rhythm:dev
    profiles:
      - "rhythm-dev"
    container_name: cogni-rhythm-dev
    restart: always
    networks:
      - cogni-network  # ← All containers on same network
    volumes:
      - /root/cogni-test/data/:/app/data
    environment:
      - MODE=DEV
      - DATABASE_URL=file:./data/rhythm-dev.db
      - PUBLIC_VAPID_SUBJECT=${PUBLIC_VAPID_SUBJECT}
      - PUBLIC_VAPID_KEY=${PUBLIC_VAPID_KEY}
      - PRIVATE_VAPID_KEY=${PRIVATE_VAPID_KEY}
      - ORIGIN=https://dev.cogni-rhythm.ru
      - PUBLIC_PASSWORD=261180
    stdin_open: true  # -i
    tty: true         # -t

  cogni-rhythm:
    build:
      context: ./apps/cogni-rhythm
    image: ghcr.io/multifacs/cogni-test/cogni-rhythm:latest
    profiles:
      - "rhythm-prod"
    container_name: cogni-rhythm
    restart: always
    networks:
      - cogni-network  # ← All containers on same network
    volumes:
      - /root/cogni-test/data/:/app/data
    environment:
      - MODE=PROD
      - DATABASE_URL=file:./data/rhythm.db
      - PUBLIC_VAPID_SUBJECT=${PUBLIC_VAPID_SUBJECT}
      - PUBLIC_VAPID_KEY=${PUBLIC_VAPID_KEY}
      - PRIVATE_VAPID_KEY=${PRIVATE_VAPID_KEY}
      - ORIGIN=https://cogni-rhythm.ru
      - PUBLIC_PASSWORD=261180
    stdin_open: true  # -i
    tty: true         # -t

  drizzle-gateway:
    image: ghcr.io/drizzle-team/gateway:latest
    profiles:
      - "web-db"
    container_name: drizzle-gate
    restart: always
    ports:
      - "4983:4983"
    environment:
      - PORT=4983
      - STORE_PATH=/database
      - MASTERPASS=2001nikita  # Change this!
    volumes:
      - drizzle-gateway:/app
      - /root/cogni-test/data/:/database  # Mount your DB folder as read-only

volumes:
  drizzle-gateway:  # Named volume for Drizzle Gateway config

networks:
  cogni-network:
